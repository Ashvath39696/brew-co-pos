services:
  - type: web
    name: brew-co-pos
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npx prisma db seed && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brew-co-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: brew-co-db
    region: oregon
    plan: free
    databaseName: coffeepos
    user: postgres
